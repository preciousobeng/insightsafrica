# Per-country configuration for InsightsAfrica page generation.
# Consumed by scripts/build_pages.py to render frontend/_templates/*.html.
#
# QUIRKS captured as explicit data (do not hide in template logic):
#   - ivorycoast: fine level is `regions` (33), coarse is `districts` (14) — INVERTED vs Ghana.
#                 district boundaries have EMPTY p.name; name lives in p.region.
#   - nigeria:    fine level `lgas`; p.region holds the STATE name (property named region).
#   - southafrica: province boundaries have EMPTY p.name; province name in p.region.
#   - capeverde:  single level `islands`, no compound keys.
#
# Previously-buggy values now FIXED on the live pages (commit de4065a) and reflected here:
#   - southafrica.flood weather widget: Lagos -> Johannesburg (-26.2041, 28.0473)
#   - senegal map_center: Ivory Coast's [7.5, -5.5] -> [14.5, -14.5]
# NOTE for the generator: verify against the CURRENT (fixed) committed pages, not the old ones.
#
# 3 more pre-existing bugs found while mapping flood-page tokens — NOW FIXED 2026-06-13:
#   - southafrica.flood About text was NIGERIA's -> "KwaZulu-Natal, the Eastern Cape, and the Highveld."
#   - southafrica fine summary noun "% of districts" -> "% of municipalities" (matches button label)
#   - ivorycoast/senegal shared generic About text -> country-specific
#     (IC: Abidjan lagoon belt / central basins / northern savanna;
#      SN: Senegal River valley / groundnut basin / Casamance)
# Generator must verify against these CURRENT (fixed) pages. about_text + summary noun
# are per-page strings the template will pull from config (to be added when templates are authored).

ghana:
  slug: ghana
  name: Ghana
  display_name: Ghana
  is_root: true                 # served at /, no country subfolder
  has_infrastructure: true      # IFT/drainage layer (ghana_infrastructure.json)
  api_prefix: ""                # uses /api/flood, /api/boundaries (no country segment)
  api_country: ghana            # /api/ghana/flood/anomaly/...
  tile_prefix: /tiles
  map_center: [7.9, -1.0]
  map_zoom: 7
  weather: { lat: "5.5560", lng: "-0.1969", location: Accra, timezone: Africa/Accra }
  levels:
    coarse: { key: regions,   label: Regions,   count: 16 }
    fine:   { key: districts, label: Districts, count: 260 }
  default_visible: regions       # listed first in the Boundaries button group
  flood:
    data_base: /api
    anomaly_base: /api/ghana
    coarse_noun: Region
    region_noun: Region
    summary_noun: districts
    fine_mouseover_prop: region
    about_intro: "Covering Ghana's major flood corridors:"
    about_regions: "Accra, Volta River Basin, and Northern Region."
    buttons:
      - { key: regions,   label: Regions,   count: 16, active: true }
      - { key: districts, label: Districts, count: 260, active: false }
    downloads:
      csv:
        - { level: regions,   label: Regions }
        - { level: districts, label: Districts }
      geojson:
        - { file: regions,   label: "Regional boundaries" }
        - { file: districts, label: "District boundaries" }

nigeria:
  slug: nigeria
  name: Nigeria
  display_name: Nigeria
  is_root: false
  has_infrastructure: false
  api_prefix: /api/nigeria
  api_country: nigeria
  tile_prefix: /ng-tiles
  map_center: [9.0, 8.0]
  map_zoom: 6
  weather: { lat: "6.5244", lng: "3.3792", location: Lagos, timezone: Africa/Lagos }
  levels:
    coarse: { key: states, label: States, count: 37 }
    fine:   { key: lgas,   label: LGAs,  count: 774 }
  default_visible: states
  flood:
    data_base: /api/nigeria
    anomaly_base: /api/nigeria
    coarse_noun: State
    region_noun: Region
    summary_noun: LGAs
    fine_mouseover_prop: state      # QUIRK/BUG: should be region (chart hover broken); preserved for byte-identical
    about_intro: "Covering Nigeria's major flood corridors:"
    about_regions: "Lagos, Niger Delta, and the North-Central flood plains."
    buttons:   # ordered as on the page (default-visible first); active flag set accordingly
      - { key: states, label: States, count: 37,  active: true }
      - { key: lgas,   label: LGAs,   count: 774, active: false }
    downloads:
      csv:
        - { level: states, label: States }
        - { level: lgas,   label: LGAs }
      geojson:
        - { file: states, label: "State boundaries" }
        - { file: lgas,   label: "LGA boundaries" }

ivorycoast:
  slug: ivorycoast
  name: Ivory Coast
  display_name: "Côte d'Ivoire"
  is_root: false
  has_infrastructure: false
  api_prefix: /api/ivorycoast
  api_country: ivorycoast
  tile_prefix: /ic-tiles
  map_center: [7.5, -5.5]
  map_zoom: 6
  weather: { lat: "5.3599", lng: "-4.0083", location: Abidjan, timezone: Africa/Abidjan }
  levels:
    coarse: { key: districts, label: Districts, count: 14 }   # INVERTED: districts coarse, regions fine
    fine:   { key: regions,   label: Regions,   count: 31 }
  default_visible: districts
  fine_empty_name: true          # IC district boundaries have empty p.name (name in p.region)
  flood:
    data_base: /api/ivorycoast
    endpointmap_multiline: true
    anomaly_base: /api/ivorycoast
    compound_key_level: districts   # INVERTED: uses coarse level for compound key (districts have empty p.name)
    bold_border_level: regions      # INVERTED: fine level gets bold white border in anomaly mode
    coarse_noun: District
    region_noun: Region
    summary_noun: districts
    fine_mouseover_prop: district   # QUIRK/BUG: should be region (chart hover broken); preserved for byte-identical
    about_intro: "Covering Côte d'Ivoire's flood-prone zones:"
    about_regions: "the Abidjan lagoon belt, the central basins, and the northern savanna."
    buttons:
      - { key: districts, label: Districts, count: 14, active: true }
      - { key: regions,   label: Regions,   count: 31, active: false }
    downloads:
      csv:
        - { level: districts, label: Districts }
        - { level: regions,   label: Regions }
      geojson:
        - { file: districts, label: "District boundaries" }

