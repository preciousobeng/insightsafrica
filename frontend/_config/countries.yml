    buttons:
      - { key: provinces, label: Provinces,     count: 9,   active: true }
      - { key: districts, label: Municipalities, count: 257, active: false }
    downloads:   # BUGS preserved: CSV labels say States/LGAs, geojson points to nigeria's states/lgas files
      csv:
        - { level: provinces, label: States }
        - { level: districts, label: LGAs }
      geojson:
        - { file: states, label: "State boundaries" }
        - { file: lgas,   label: "LGA boundaries" }

