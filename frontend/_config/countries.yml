# Per-country configuration for InsightsAfrica page generation.
# Consumed by scripts/build_pages.py to render frontend/_templates/*.html.
#
# QUIRKS captured as explicit data (do not hide in template logic):
#   - ivorycoast: fine level is `regions` (33), coarse is `districts` (14) — INVERTED vs Ghana.
#                 district boundaries have EMPTY p.name; name lives in p.region.
#   - nigeria:    fine level `lgas`; p.region holds the STATE name (property named region).
#   - southafrica: province boundaries have EMPTY p.name; province name in p.region.
#   - capeverde:  single level `islands`, no compound keys.
#
# Previously-buggy values now FIXED on the live pages (commit de4065a) and reflected here:
#   - southafrica.flood weather widget: Lagos -> Johannesburg (-26.2041, 28.0473)
#   - senegal map_center: Ivory Coast's [7.5, -5.5] -> [14.5, -14.5]
# NOTE for the generator: verify against the CURRENT (fixed) committed pages, not the old ones.

ghana:
  slug: ghana
  name: Ghana
  is_root: true                 # served at /, no country subfolder
  has_infrastructure: true      # IFT/drainage layer (ghana_infrastructure.json)
  api_prefix: ""                # uses /api/flood, /api/boundaries (no country segment)
  api_country: ghana            # /api/ghana/flood/anomaly/...
  tile_prefix: /tiles
  map_center: [7.9, -1.0]
  map_zoom: 7
  weather: { lat: "5.5560", lng: "-0.1969", location: Accra, timezone: Africa/Accra }
  levels:
    coarse: { key: regions,   label: Regions,   count: 16 }
    fine:   { key: districts, label: Districts, count: 260 }
  default_visible: regions       # listed first in the Boundaries button group

nigeria:
  slug: nigeria
  name: Nigeria
  is_root: false
  has_infrastructure: false
  api_prefix: /api/nigeria
  api_country: nigeria
  tile_prefix: /ng-tiles
  map_center: [9.0, 8.0]
  map_zoom: 6
  weather: { lat: "6.5244", lng: "3.3792", location: Lagos, timezone: Africa/Lagos }
  levels:
    coarse: { key: states, label: States, count: 37 }
    fine:   { key: lgas,   label: LGAs,  count: 774 }
  default_visible: states

ivorycoast:
  slug: ivorycoast
  name: Ivory Coast
  is_root: false
  has_infrastructure: false
  api_prefix: /api/ivorycoast
  api_country: ivorycoast
  tile_prefix: /ic-tiles
  map_center: [7.5, -5.5]
  map_zoom: 7
  weather: { lat: "5.3599", lng: "-4.0083", location: Abidjan, timezone: Africa/Abidjan }
  levels:
    coarse: { key: districts, label: Districts, count: 14 }   # INVERTED: districts coarse, regions fine
    fine:   { key: regions,   label: Regions,   count: 31 }
  default_visible: districts
  fine_empty_name: true          # IC district boundaries have empty p.name (name in p.region)

senegal:
  slug: senegal
  name: Senegal
  is_root: false
  has_infrastructure: false
  api_prefix: /api/senegal
  api_country: senegal
  tile_prefix: /sn-tiles
  map_center: [14.5, -14.5]      # fixed 2026-06-13 (was IC's [7.5, -5.5])
  map_zoom: 7
  weather: { lat: "14.6928", lng: "-17.4467", location: Dakar, timezone: Africa/Dakar }
  levels:
    coarse: { key: regions,      label: Regions,     count: 14 }
    fine:   { key: departments,  label: Departments, count: 46 }
  default_visible: departments

southafrica:
  slug: southafrica
  name: South Africa
  is_root: false
  has_infrastructure: false
  api_prefix: /api/southafrica
  api_country: southafrica
  tile_prefix: /za-tiles
  map_center: [-29.0, 25.0]
  map_zoom: 6
  weather: { lat: "-26.2041", lng: "28.0473", location: Johannesburg, timezone: Africa/Johannesburg }  # fixed 2026-06-13 (was Lagos)
  levels:
    coarse: { key: provinces, label: Provinces,     count: 9 }
    fine:   { key: districts, label: Municipalities, count: 257 }   # NOTE: key=districts but DISPLAY label=Municipalities
  default_visible: provinces
  coarse_empty_name: true        # SA province boundaries have empty p.name (name in p.region)

capeverde:
  slug: capeverde
  name: Cape Verde
  is_root: false
  has_infrastructure: false
  api_prefix: /api/capeverde
  api_country: capeverde
  tile_prefix: /cv-tiles
  map_center: [16.0, -24.0]
  map_zoom: 8
  weather: { lat: "14.9315", lng: "-23.5136", location: Praia, timezone: Atlantic/Cape_Verde }
  single_level: { key: islands, label: Islands }   # no coarse/fine, no compound keys
